<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, user-scalable=yes, minimum-scale=1, maximum-scale=5">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">

    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    <meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:image" content="{{ site.url }}/assets/logo.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="{{ site.title }} - Logo">
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="{{ site.url }}{{ page.url }}">
    <meta name="twitter:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
    <meta name="twitter:description" content="{{ page.description | default: site.description }}">
    <meta name="twitter:image" content="{{ site.url }}/assets/logo.png">
    <meta name="twitter:image:alt" content="{{ site.title }} - Logo">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/logo.png">
    <link rel="shortcut icon" href="/assets/logo.png">
    <meta name="theme-color" content="#06b6d4">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Custom Theme CSS -->
    <link rel="stylesheet" href="/assets/custom-theme.css">

    <!-- Cloudflare Web Analytics -->
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "c50b3c226c88413ebf8aa471669540bd"}'></script>
    <!-- End Cloudflare Web Analytics -->

    <!-- JSON-LD Schema Markup for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Noble Worlanyo Antwi",
      "url": "{{ site.url }}",
      "jobTitle": "Cloud Security Engineer",
      "description": "{{ site.description }}",
      "alumniOf": {
        "@type": "EducationalOrganization",
        "name": "Illinois Institute of Technology"
      },
      "knowsAbout": ["Cloud Security", "AWS", "Azure", "GCP", "IAM", "Threat Detection", "Digital Forensics", "Penetration Testing", "DevSecOps"],
      "sameAs": [
        "https://linkedin.com/in/{{ site.social.linkedin }}",
        "https://github.com/{{ site.social.github }}"
      ],
      "email": "{{ site.social.email }}"
    }
    </script>
  </head>

  <body>
    {% include site-header.html %}
    {% include site-nav.html %}

    <!-- Main Content -->
    <main class="main-content">
      <div class="container">
        <div style="position: relative;">
          {{ content }}
        </div>
      </div>
    </main>

    {% include site-footer.html %}

    <script>
      // Hide Jekyll front matter that appears in the content
      document.addEventListener('DOMContentLoaded', function() {
        const contentDiv = document.querySelector('main > div > div');
        if (!contentDiv) return;

        const paragraphs = contentDiv.querySelectorAll('p, hr');
        let frontMatterEnded = false;

        paragraphs.forEach((el, index) => {
          const text = el.textContent.trim();
          
          // Hide elements that are front matter
          if (text.startsWith('---') || text.includes('layout:') || text.includes('title:')) {
            el.style.display = 'none';
            el.style.visibility = 'hidden';
            el.style.margin = '0';
            el.style.padding = '0';
            el.style.height = '0';
          }
          
          // Also hide the first paragraph if it looks like front matter output
          if (index === 0 && (text.includes('layout:') || text.includes('default') || text.startsWith('title:'))) {
            el.style.display = 'none';
            el.style.visibility = 'hidden';
            el.style.margin = '0';
            el.style.padding = '0';
            el.style.height = '0';
          }
        });

        // Initialize project accordions - ensure they work with details/summary
        const accordions = document.querySelectorAll('.project-accordion');
        accordions.forEach(accordion => {
          const summary = accordion.querySelector('summary');
          if (summary) {
            summary.addEventListener('click', function(e) {
              // The native details/summary behavior should work automatically
              // This ensures proper interaction across all browsers
              setTimeout(() => {
                accordion.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
              }, 100);
            });
          }
        });
      });
    </script>
  </body>
</html>

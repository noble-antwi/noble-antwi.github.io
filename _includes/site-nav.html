<nav class="site-nav">
  <div class="nav-container">
    <button class="nav-toggle" aria-label="Open navigation" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <ul class="nav-links">
      <li>
        <a href="/" {% if page.url == "/" %}class="active"{% endif %}>Home</a>
      </li>
      <li>
        <a href="/projects" {% if page.url contains "/projects" %}class="active"{% endif %}>Projects</a>
      </li>
      <li>
        <a href="/certifications" {% if page.url contains "/certifications" %}class="active"{% endif %}>Certifications</a>
      </li>
      <li>
        <a href="/blog" {% if page.url contains "/blog" or page.layout == "post" %}class="active"{% endif %}>Blog</a>
      </li>
      <li>
        <a href="/contact" {% if page.url contains "/contact" %}class="active"{% endif %}>Contact</a>
      </li>
    </ul>
  </div>
</nav>

<script>
  (function() {
    var toggle = document.querySelector('.nav-toggle');
    var links = document.querySelector('.nav-links');
    if (!toggle || !links) return;
    toggle.addEventListener('click', function() {
      var isOpen = links.classList.toggle('is-open');
      toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });
  })();
</script>
